<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone 15 Pro</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #0f0f0f 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 40px 20px;
  gap: 16px;
}
.device-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.frame {
  position: relative;
  background: #1C1C1E;
  border-radius: 52px;
  padding: 12px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 40px 80px rgba(0,0,0,0.5),
    0 16px 40px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.08);
  animation: float 6s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0deg) rotateX(2deg) rotateY(-2deg); }
  50% { transform: translateY(-10px) rotateX(-1deg) rotateY(1deg); }
}
.screen-wrap {
  position: relative;
  width: 366px;
  height: 820px;
  border-radius: 40px;
  overflow: hidden;
  background: #000;
}
.screen-wrap img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.di {
  position: absolute;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  width: 90px;
  height: 28px;
  background: #000;
  border-radius: 14px;
  z-index: 10;
}
.home-bar {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 5px;
  background: rgba(255,255,255,0.22);
  border-radius: 3px;
}
.label {
  font-size: 11px;
  font-weight: 600;
  color: #6B7280;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.bg-gradient {
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 40%, rgba(59,130,246,0.08) 0%, transparent 50%),
              radial-gradient(circle at 70% 60%, rgba(139,92,246,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: -1;
}
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="device-wrap">
  <div class="frame">
    <div class="screen-wrap">
      <div class="di"></div>
      <img src="login-screen.png" alt="Screen" />
      <div class="home-bar"></div>
    </div>
  </div>
  <span class="label">iPhone 15 Pro</span>
</div>
</body>
</html>
