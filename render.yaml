services:
  # API Backend Service
  - type: web
    name: creatorarmour-api
    env: node
    plan: free
    rootDir: server
    buildCommand: corepack enable && corepack prepare pnpm@latest --activate && pnpm install --no-frozen-lockfile && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
    healthCheckPath: /health

  # Frontend Static Site
  - type: web
    name: creatorarmour-frontend
    env: static
    buildCommand: corepack enable && corepack prepare pnpm@latest --activate && pnpm install --no-frozen-lockfile && pnpm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; frame-src 'self' https://www.facebook.com https://facebook.com https://*.facebook.com https://calendly.com https://assets.calendly.com https://vercel.live https://*.vercel.live https://*.trycloudflare.com; media-src 'self' https://ooaxtwmqrvfzdqzoijcj.supabase.co https://*.cdninstagram.com; script-src 'self' 'unsafe-eval' 'unsafe-inline' data: blob: https://vercel.live https://*.vercel.live instant-preview-site.vercel.app instant-preview-site-e4sagrlvu.vercel.sh https://assets.calendly.com https://www.googletagmanager.com https://connect.facebook.net https://static.ads-twitter.com https://storage.googleapis.com; worker-src 'self' blob: https://storage.googleapis.com; style-src 'self' 'unsafe-inline' https://assets.calendly.com https://fonts.googleapis.com https://api.fontshare.com https://cdn.fontshare.com; img-src 'self' data: blob: https://api.dicebear.com https://www.facebook.com https://www.google-analytics.com https://t.co https://ooaxtwmqrvfzdqzoijcj.supabase.co https://*.cdninstagram.com https://images.unsplash.com https://wsrv.nl *; connect-src 'self' ws: wss: http://localhost:3001 https://assets.calendly.com https://calendly.com https://api.postalpincode.in https://api.dicebear.com https://ooaxtwmqrvfzdqzoijcj.supabase.co https://*.cdninstagram.com https://images.unsplash.com https://wsrv.nl https://www.transparenttextures.com https://www.google-analytics.com https://www.googletagmanager.com https://connect.facebook.net https://graph.facebook.com https://overbridgenet.com https://www.facebook.com https://mpc-prod-17-s6uit34pua-wl.a.run.app https://*.a.run.app https://demo-1.conversionsapigateway.com https://*.conversionsapigateway.com https://vercel.live https://*.vercel.live https://noticebazaar-api.onrender.com https://creatorarmour-api.onrender.com https://creatorarmour-api-l6a9.onrender.com https://*.trycloudflare.com https://api.creatorarmour.com https://api.creatorarmour.com https://creatorarmour.com https://www.cre