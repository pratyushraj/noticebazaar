    routes:
      - type: rewrite
        source: /api/*
        destination: https://creatorarmour-api-l6a9.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        value: https://ooaxtwmqrvfzdqzoijcj.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_BASE_URL
        value: https://creatorarmour-api-l6a9.onrender.com
